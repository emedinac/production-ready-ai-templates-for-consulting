services:
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.13.0
    environment:
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
    volumes:
      - mlflow-db:/mlflow-db
    command: mlflow server --host 0.0.0.0 --backend-store-uri postgresql://mlflow:password@db/mlflow

  api:
    build: .
    environment:
      - MODEL_VERSION=latest
      - DVC_REMOTE=models
    ports:
      - "8000:8000"
    depends_on:
      - mlflow

  db:
    image: postgres:13
    environment:
      - POSTGRES_DB=mlflow
      - POSTGRES_USER=mlflow
      - POSTGRES_PASSWORD=password
    volumes:
      - postgres-data:/var/lib/postgresql/data
  prometheus:
    image: prom/prometheus:v2.52.0
    ports: ["9090:9090"]
    volumes: ["./infra/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml"]

  grafana:
    image: grafana/grafana:10.4.2
    ports: ["3000:3000"]
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes: ["./infra/monitoring/grafana_dashboards:/etc/grafana/provisioning/dashboards"]
    depends_on: [prometheus]

volumes:
  mlflow-db:
  postgres-data:
  grafana-data: