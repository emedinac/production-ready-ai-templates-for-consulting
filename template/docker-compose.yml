services:
  # MLflow Tracking Server
  mlflow:
    build:
      context: .
      dockerfile: infra/mlflow/Dockerfile
    environment:
      - MLFLOW_BACKEND_STORE_URI=postgresql://mlflow:password@db:5432/mlflow
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
    volumes:
      - ./mlruns:/mlruns
      - ./mlflow.db:/mlflow.db
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:///mlflow.db
      --default-artifact-root /mlruns

  
  # PostgreSQL (MLflow backend + DVC remote)
  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=mlflow
      - POSTGRES_USER=mlflow
      - POSTGRES_PASSWORD=password
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mlflow"]
      interval: 5s
      timeout: 5s
      retries: 5

  
  # Compute Service (Training, Testing, DVC Pipeline)
  compute:
    user: "${UID}:${GID}"
    build: .
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - MODEL_VERSION=latest
      - DVC_REMOTE=models
      - PYTHONUNBUFFERED=1
    volumes:
      - .:/app
      - dvc-cache:/app/.dvc/cache
      - model-artifacts:/app/models/artifacts
      - processed-data:/app/data/processed
    working_dir: /app
    depends_on:
      db:
        condition: service_healthy
      mlflow:
        condition: service_started
    entrypoint: []
    command: ["python", "-m", "{{project_name}}.src.models.train"]

  
  # API Service (FastAPI Inference)
  api:
    build: .
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - MODEL_VERSION=latest
      - PYTHONUNBUFFERED=1
    volumes:
      - model-artifacts:/app/models/artifacts:ro
    ports:
      - "8000:8000"
    depends_on:
      - mlflow
    # Default: run API server
    command: ["uvicorn", "{{project_name}}.serving.api:app", "--host", "0.0.0.0", "--port", "8000"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  
  # Prometheus (Metrics Collection)
  prometheus:
    image: prom/prometheus:v2.52.0
    volumes:
      - ./infra/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"

  
  # Grafana (Visualization & Dashboards)
  grafana:
    image: grafana/grafana:10.4.2
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_SECURITY_ADMIN_USER=admin
    volumes:
      - ./infra/monitoring/grafana_dashboards:/etc/grafana/provisioning/dashboards
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

volumes:
  postgres-data:
  mlflow-artifacts:
  dvc-cache:
  model-artifacts:
  processed-data:
  prometheus-data:
  grafana-data: