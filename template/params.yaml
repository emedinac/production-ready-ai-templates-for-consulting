experiment:
  name: "exp_001"
  seed: 42
  tags: [ "baseline" ]

task:
  type: "text_classification"
  problem_type: "binary"

data:
  source:
    type: "huggingface"

    huggingface:
      name: "imdb"
      version: null

    local:
      path: null

    s3:
      bucket: null
      key: null

  split:
    train: 0.8
    validation: 0.1
    test: 0.1

  preprocessing:
    text:
      lowercase: true
      max_length: 256

    tabular:
      normalize: true
      handle_missing: "mean"

  processed_dir: "{{project_name}}/data/processed"

model:
  type: "transformer"
  transformer:
    name: "bert-base-uncased"
    dropout: 0.1

training:
  epochs: 3
  batch_size: 32
  learning_rate: 0.0001
  optimizer: "adam"
  scheduler:
    type: "linear"
    warmup_steps: 500

evaluation:
  metrics: [ "accuracy", "f1" ]
  validation:
    type: "holdout"

runtime:
  device: "auto"
  num_workers: 4

tracking:
  mlflow:
    enabled: true
    experiment_name: "default"

artifacts:
  metrics_dir: "{{project_name}}/metrics" # Documentation only - actual paths hardcoded in code

output:
  model_path: "{{project_name}}/models/artifacts/model.pkl"
  metrics_path: "{{project_name}}/models/metrics.json"
  logs_path: "{{project_name}}/logs"
