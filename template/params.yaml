experiment:
  name: "exp_001"
  seed: 42
  tags: [ "baseline" ]

task:
  type: "text_classification" # text_classification | tabular_regression
  problem_type: "binary" # binary | multiclass | regression

data:
  source:
    type: "huggingface" # huggingface | local | s3

    huggingface:
      name: "imdb"
      version: null

    local:
      path: null

    s3:
      bucket: null
      key: null

  split:
    train: 0.8
    validation: 0.1
    test: 0.1

  preprocessing:
    text:
      lowercase: true
      max_length: 256

    tabular:
      normalize: true
      handle_missing: "mean"

  processed_dir: "{{project_name}}/data/processed"

model:
  type: "transformer" # transformer | xgboost | linear

  transformer:
    name: "distilbert-base-uncased"
    dropout: 0.1

  xgboost:
    max_depth: 6
    n_estimators: 100

  linear:
    fit_intercept: true

training:
  epochs: 3
  batch_size: 32
  learning_rate: 0.0001
  optimizer: "adamw"

  scheduler:
    type: "linear" # linear | none
    warmup_steps: 100

evaluation:
  metrics: [ "accuracy", "f1" ]

  validation:
    type: "holdout" # holdout | kfold
    folds: null

runtime:
  device: "auto" # auto | cpu | cuda
  num_workers: 4

tracking:
  mlflow:
    enabled: true
    experiment_name: "default"

artifacts:
  metrics_dir: "metrics"

output:
  model_path: "models/model.pkl"
  metrics_path: "metrics.json"
  logs_path: "logs/train.log"
