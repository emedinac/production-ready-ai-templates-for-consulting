_subdirectory: template
_templates_suffix: ""

project_name:
    type: str
    help: Project name
    default: my_ai_project

use_dvc:
    type: bool
    help: Use DVC for pipeline and data versioning?
    default: true

dvc_storage_backend:
    type: str
    help: DVC storage backend
    default: local
    choices:
        - local
        - s3
        - gcs
        - azure

use_mlflow:
    type: bool
    help: Use MLflow for experiment tracking?
    default: true

use_monitoring:
    type: bool
    help: Add Prometheus + Grafana monitoring?
    default: true

use_fastapi:
    type: bool
    help: Add FastAPI serving layer?
    default: true

use_agents:
    type: bool
    help: Add agentic eval loop?
    default: false

use_promotion:
    type: bool
    help: Add model promotion gates?
    default: true

_tasks:
    - "bash scripts/setup.sh {{ project_name }}"

    - >-
      {% if use_dvc %} echo "DVC enabled with {{ dvc_storage_backend }} backend"
      {% endif %}

    - >-
      {% if use_dvc and dvc_storage_backend == 'local' %} echo "Local DVC
      storage selected (no external init required)" {% endif %}

_exclude:
    - .venv
    - venv
    - __pycache__
    - .pytest_cache
    - "{% if not use_dvc %}dvc.yaml{% endif %}"
    - "{% if not use_dvc %}.dvcignore{% endif %}"
    - "{% if not use_dvc %}.github/workflows/dvc-pipeline.yml{% endif %}"
    - "{% if not use_dvc %}docker-compose.prod.yml{% endif %}"

    - "{% if not use_mlflow %}infra/mlflow{% endif %}"
    - "{% if not use_monitoring %}infra/monitoring{% endif %}"
    - "{% if not use_fastapi %}{{ project_name }}/serving{% endif %}"
    - "{% if not use_agents %}agents{% endif %}"
    - "{% if not use_promotion %}promotion{% endif %}"
